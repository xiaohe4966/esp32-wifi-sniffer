; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio

; Partition table for large apps with SPIFFS
board_build.partitions = default_8MB.csv

; Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ESP32_WIFI_DYNAMIC_RX_BUFFER_NUM=64
    -DCONFIG_ESP32_WIFI_DYNAMIC_TX_BUFFER_NUM=64
    -DCONFIG_ESP32_WIFI_TX_BA_WIN=32
    -DCONFIG_ESP32_WIFI_RX_BA_WIN=32
    -DCONFIG_ESP32_WIFI_AMPDU_TX_ENABLED=1
    -DCONFIG_ESP32_WIFI_AMPDU_RX_ENABLED=1
    -DCONFIG_ESP32_WIFI_CSI_ENABLED=1
    -DCONFIG_ESP32_WIFI_ENABLE_WPA3_SAE=1

; Library dependencies
lib_deps = 
    bblanchon/ArduinoJson@^6.21.3
    mathieucarbou/Async TCP@^3.1.4
    https://github.com/mathieucarbou/ESPAsyncWebServer.git
    adafruit/Adafruit SSD1306@^2.5.9
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit BusIO@^1.14.5
    bitbank2/PNGdec@^1.0.2

; Upload settings
upload_speed = 115200
upload_protocol = esptool

; Debug settings
;debug_tool = esp-prog
;debug_init_break = tbreak setup

[env:esp32-c6-devkitc-1]
platform = espressif32@6.5.0
board = esp32-c6-devkitc-1
framework = arduino
board_build.mcu = esp32c6
board_build.f_cpu = 160000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio

; Partition table
board_build.partitions = default_8MB.csv

; Monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ESP32_WIFI_ENABLE_WPA3_SAE=1

; Library dependencies
lib_deps = 
    bblanchon/ArduinoJson@^6.21.3
    mathieucarbou/Async TCP@^3.1.4
    https://github.com/mathieucarbou/ESPAsyncWebServer.git
    adafruit/Adafruit SSD1306@^2.5.9
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit BusIO@^1.14.5

; Upload settings
upload_speed = 921600
upload_protocol = esptool
